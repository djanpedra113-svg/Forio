<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forio</title>
   <link rel="stylesheet" href="quiz.css">
</head>
<body>
    <div class="Forio logo">
        <img src="Forio logo.png" alt="Forio Logo" class="logo-img">
    </div>
    
        <div class="quiz-container">
        <div class="form-box">
        <h1>Quiz!</h1>

    <div class="question">
        <h3>1. Which technical control helps block unauthorised network traffic?</h3>
        <label><input type="radio" name="question1" value="A"> A. Chain of custody<br></label>
        <label><input type="radio" name="question1" value="B"> B. JavaScript<br></label>
        <label><input type="radio" name="question1" value="C"> C. Firewall<br></label>
        <label><input type="radio" name="question1" value="D"> D. CSS<br></label>
    </div>

    <div class="question">
        <h3>2. Digital evidence can include emails and log files.</h3>
        <label><input type="radio" name="question2" value="True">True <br></label>
        <label><input type="radio" name="question2" value="False">False <br></label>
    </div>

    <div class="question">
        <h3>3. What process tracks how evidence is handled during an investigation?</h3>
        <input type="text" name="question3" placeholder="Enter your answer here">
    </div>

    <div class="question">
        <h3>4. Why is encryption used?</h3>
      <label> <input type="radio" name="question4" value="A">A. To create one passwords</label><br>
      <label><input type="radio" name="question4" value="B">B. To protect sensitive information</label><br>
      <label><input type="radio" name="question4" value="C">C. To replace logs</label><br>
      <label><input type="radio" name="question4" value="D">D.  To increase emails</label>
    </div>  

    <div class="question">
        <h3>5. Access controls help limit unauthorised access to systems.</h3>
        <label><input type="radio" name="question5" value="True">True <br></label>
        <label><input type="radio" name="question5" value="False">False <br></label>
    </div>

 <button id="submit" type="button">Submit</button>
 <div id="results"></div>
 <div id="saved-results"></div>
   
 </div>
 <script src="quiz4.js"></script>
 
</body>
</html>
